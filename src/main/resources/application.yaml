spring:
  application:
    name: product-service

  datasource:
    url: jdbc:postgresql://10.0.0.10:5432/productdb
    username: productuser
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

server:
  port: 8084

logging:
  level:
    org:
      springframework: INFO
      hibernate:
        SQL: INFO
